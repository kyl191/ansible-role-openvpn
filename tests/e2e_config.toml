# End-to-End Test Configuration

[aws]
region = "us-east-2"
profile = "sdk"
# tag_key = "Environment"
# Optional: tag_value = "Test"

[ssh]
default_user = "ec2-user"
# Path to SSH key can be overridden here or via CLI (CLI preferred for secrets)
# key_path = "~/.ssh/id_rsa"

[terraform]
# Directory containing the terraform-aws-ipv6-v2 config. terraform.tfvars there is the full
# merged instance matrix (dual-stack + IPv4-only + IPv6-only, x86_64 + arm64, ~26 instances) -
# address family and spot are per-instance_config-entry fields now, not per-scenario var-files,
# so a single terraform apply provisions everything at once (the AWS account's vCPU quota
# comfortably covers it - the old "10-instance limit, sequential scenarios" constraint that used
# to force 4 separate apply/destroy cycles no longer applies). var_files is still a list for
# flexibility (this loop handles N var-files, including N=1, without special-casing it), but in
# practice there's just the one file. Everything is destroyed once, after every var-file has run
# - not per var-file, and not skipped just because one failed.
dir = "~/Sync/code/terraform-aws-ipv6-v2"
var_files = ["terraform.tfvars"]
