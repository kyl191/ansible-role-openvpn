---
name: CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  check-syntax:
    runs-on: ubuntu-latest
    name: check-syntax
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Run ansible-lint
        uses: ansible/ansible-lint@v26.6.0
        with:
          requirements_file: requirements.yml

  build-rhel-legacy:
    runs-on: ubuntu-latest
    name: rhel-legacy-${{ matrix.version }}
    needs:
      - check-syntax
    strategy:
      fail-fast: false
      matrix:
        version:
          - "almalinux:8"
          - "rockylinux:8"

    container:
      image: diodonfrost/ansible-${{ matrix.version }}
      env:
        container: docker
      volumes:
        - /sys/fs/cgroup:/sys/fs/cgroup
        - ${{ github.workspace }}:/etc/ansible/roles/kyl191.openvpn
      options: "--cap-add NET_ADMIN --cap-add SYS_ADMIN --device /dev/net/tun"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
      - name: Update ansible
        run: dnf install -y python39 && pip3.9 install -U ansible
      - name: Install required dependencies from Ansible Galaxy
        run: ansible-galaxy install -r /etc/ansible/roles/kyl191.openvpn/requirements.yml
      - name: Make sure ansible connection is sane
        run: ansible -m setup -c local -i 127.0.0.1, all
      - name: Run ansible playbook
        run: >
          ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml -vv
          -e '{"openvpn_use_tls_crypt": false, "openvpn_manage_sysctl": false, "openvpn_manage_firewall_rules": false}'
      - name: Check idempotency
        run: >
          ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml -vv
          -e '{"openvpn_use_tls_crypt": false, "openvpn_manage_sysctl": false, "openvpn_manage_firewall_rules": false}'
      - name: Container state debug output
        continue-on-error: true
        run: |
          ls -lR /etc/openvpn
          echo "cat openvpn_udp_1194.conf"
          find /etc/openvpn/ -maxdepth 3 -name openvpn_udp_1194.conf -type f -exec cat {} \;
          echo "cat alpha-*.ovpn"
          find /etc/openvpn/ -maxdepth 3 -name "alpha-*.ovpn" -type f -exec cat {} \;

  build-debian-like:
    runs-on: ubuntu-latest
    name: debian-like-${{ matrix.version }}
    needs:
      - check-syntax
    strategy:
      fail-fast: false
      matrix:
        version:
          - "ubuntu:22.04"

    container:
      image: diodonfrost/ansible-${{ matrix.version }}
      env:
        container: docker
      volumes:
        - /sys/fs/cgroup:/sys/fs/cgroup
        - ${{ github.workspace }}:/etc/ansible/roles/kyl191.openvpn
      options: "--cap-add NET_ADMIN --cap-add SYS_ADMIN --device /dev/net/tun"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
      - name: Upgrade ansible
        run: apt update && apt-get install --only-upgrade ansible -y
      - name: Install required dependencies from Ansible Galaxy
        run: ansible-galaxy install -r /etc/ansible/roles/kyl191.openvpn/requirements.yml
      - name: Make sure ansible connection is sane
        run: ansible -m setup -c local -i 127.0.0.1, all
      - name: Run ansible playbook
        run: >
          ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml -vv
          -e '{"openvpn_firewall": "iptables", "openvpn_manage_sysctl": false, "openvpn_manage_firewall_rules": false}'
      - name: Check idempotency
        run: >
          ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml -vv
          -e '{"openvpn_firewall": "iptables", "openvpn_manage_sysctl": false, "openvpn_manage_firewall_rules": false}'
      - name: Container state debug output
        continue-on-error: true
        run: |
          ls -lR /etc/openvpn
          echo "cat openvpn_udp_1194.conf"
          find /etc/openvpn/ -maxdepth 3 -name openvpn_udp_1194.conf -type f -exec cat {} \;
          echo "cat alpha-*.ovpn"
          find /etc/openvpn/ -maxdepth 3 -name "alpha-*.ovpn" -type f -exec cat {} \;

  test-no-default-route:
    runs-on: ubuntu-latest
    name: no-default-route-${{ matrix.scenario.name }}
    needs:
      - check-syntax
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: ipv4-guard-fires
            remove_ipv4_route: true
            run_mode: firewall_only
            extra_vars: '{"openvpn_firewall": "iptables"}'
            expect_success: false
          - name: ipv4-disabled-works
            remove_ipv4_route: true
            run_mode: firewall_only
            extra_vars: '{"openvpn_firewall": "iptables", "openvpn_server_network": "", "openvpn_masquerade_not_snat": true}'
            expect_success: true
          - name: ipv6-guard-fires
            remove_ipv4_route: false
            run_mode: full
            extra_vars: '{"openvpn_firewall": "iptables", "openvpn_manage_sysctl": false}'
            expect_success: false
          - name: ipv6-disabled-works
            remove_ipv4_route: false
            run_mode: full
            extra_vars: '{"openvpn_firewall": "iptables", "openvpn_server_ipv6_network": "", "openvpn_manage_sysctl": false}'
            expect_success: true

    container:
      image: ghcr.io/kyl191/ansible-images:fedora-44
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        container: docker
      volumes:
        - /sys/fs/cgroup:/sys/fs/cgroup
        - ${{ github.workspace }}:/etc/ansible/roles/kyl191.openvpn
      options: "--cap-add NET_ADMIN --cap-add SYS_ADMIN --device /dev/net/tun"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
      - name: Upgrade ansible
        run: dnf -y upgrade ansible
      - name: Install required dependencies from Ansible Galaxy
        run: ansible-galaxy install -r /etc/ansible/roles/kyl191.openvpn/requirements.yml
      - name: Make sure ansible connection is sane
        run: ansible -m setup -c local -i 127.0.0.1, all

      # Prime the container (packages incl. iptables-persistent, keys, config) while it still
      # has real network access. openvpn_no_nat skips any address-needing NAT setup here - that
      # isn't what's under test in this step, just getting everything else installed first.
      # openvpn_manage_sysctl: false because this job's container can't actually write
      # net.ipv4.ip_forward (permission denied even with --privileged on GH-hosted runners),
      # and the sysctl itself isn't part of what test-no-default-route is exercising.
      # --skip-tags firewall_persist: this job's container (GH Actions' native `container:`
      # runner, not podman --systemd=always) never boots systemd, so ansible.builtin.service
      # can't enable the iptables unit here - and enabling it at boot isn't part of what this
      # job tests either, just rule insertion and the route guards. Only tags the "Enable
      # iptables" task - saving the ruleset to disk is a plain shell command, no systemd needed.
      - name: Prime install before removing the default IPv4 route
        if: matrix.scenario.remove_ipv4_route
        run: >
          ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml -vv --skip-tags firewall_persist
          -e '{"openvpn_firewall": "iptables", "openvpn_no_nat": true, "openvpn_manage_sysctl": false}'

      # Real route removal (not mocked facts) - only affects this job's own isolated container
      # network, so the next run's gathered facts genuinely reflect a host with no default IPv4
      # route, exercising the same code path the original bug report hit.
      - name: Remove default IPv4 route to simulate an IPv4-less host
        if: matrix.scenario.remove_ipv4_route
        run: ip route del default

      - name: Run scenario (firewall tasks only), expect ${{ matrix.scenario.expect_success && 'success' || 'failure' }}
        if: matrix.scenario.run_mode == 'firewall_only'
        run: |
          set +e
          ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml --tags firewall,validate --skip-tags firewall_persist -vv -e '${{ matrix.scenario.extra_vars }}'
          rc=$?
          set -e
          if [ "${{ matrix.scenario.expect_success }}" = "true" ]; then [ $rc -eq 0 ]; else [ $rc -ne 0 ]; fi

      - name: Run scenario (full playbook), expect ${{ matrix.scenario.expect_success && 'success' || 'failure' }}
        if: matrix.scenario.run_mode == 'full'
        run: |
          set +e
          ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml -vv --skip-tags firewall_persist -e '${{ matrix.scenario.extra_vars }}'
          rc=$?
          set -e
          if [ "${{ matrix.scenario.expect_success }}" = "true" ]; then [ $rc -eq 0 ]; else [ $rc -ne 0 ]; fi

  build-systemd:
    runs-on: ubuntu-latest
    name: ${{ matrix.version }}
    needs:
      - check-syntax
    strategy:
      fail-fast: false
      matrix:
        version:
          - "fedora-43"
          - "fedora-44"
          - "almalinux-9"
          - "almalinux-10"
          - "rockylinux-9"
          - "rockylinux-10"
          - "centos-stream9"
          - "centos-stream10"
          - "debian-13"
          - "ubuntu-24.04"
          - "ubuntu-26.04"
          # - "ubi9-init"
          # - "ubi10-init"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Create container
        run: sudo podman create --name ${{ matrix.version }} --privileged --cap-add NET_ADMIN --cap-add SYS_ADMIN --device /dev/net/tun --cgroupns=host --network=bridge --systemd=always --volume=${GITHUB_WORKSPACE}:/etc/ansible/roles/kyl191.openvpn --user=root ghcr.io/kyl191/ansible-images:${{ matrix.version }}
      - name: Start container
        run: sudo podman start ${{ matrix.version }}
      # https://www.jeffgeerling.com/blog/2020/resolving-fedora-dnf-error-no-such-file-or-directory-varlibdnfrpmdblockpid
      # Add '|| true' so the CI doesn't exit if the second command fails
      - name: Wait for container to start
        run: |
          until sudo podman exec ${{ matrix.version }} systemctl is-active --quiet multi-user.target; do
            echo "Waiting for systemd... Current failed units:"
            sudo podman exec ${{ matrix.version }} systemctl list-units --failed --no-legend --no-pager 2>/dev/null || true
            sleep 5
          done
        timeout-minutes: 5
      - name: Install required dependencies from Ansible Galaxy
        run: sudo podman exec ${{ matrix.version }} ansible-galaxy install -r /etc/ansible/roles/kyl191.openvpn/requirements.yml
      - name: Make sure ansible connection is sane
        run: sudo podman exec ${{ matrix.version }} ansible -m setup -c local -i 127.0.0.1, all
      - name: Run ansible playbook
        run: >
          sudo podman exec ${{ matrix.version }} ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml -vv
      - name: Check idempotency
        run: >
          sudo podman exec ${{ matrix.version }} ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/test.yml -vv
      - name: Move generated client config file
        run: sudo podman exec ${{ matrix.version }} cp /etc/openvpn/server/alpha-localhost.ovpn /etc/openvpn/client/alpha-localhost.conf
      - name: Attempt openvpn connection
        run: sudo podman exec ${{ matrix.version }} systemctl start openvpn-client@alpha-localhost.service
      - name: Wait for a bit
        run: sleep 5
      - name: Stop openvpn connection
        run: sudo podman exec ${{ matrix.version }} systemctl stop openvpn-client@alpha-localhost.service
      - name: Check revocation
        run: >
          sudo podman exec ${{ matrix.version }} ansible-playbook /etc/ansible/roles/kyl191.openvpn/tests/revocation-test.yml -vv
      - name: Container state debug output
        continue-on-error: true
        run: |
          sudo podman exec ${{ matrix.version }} ls -lR /etc/openvpn
          echo "cat openvpn_udp_1194.conf"
          sudo podman exec ${{ matrix.version }} find /etc/openvpn/ -maxdepth 3 -name openvpn_udp_1194.conf -type f -exec cat {} \;
          echo "cat alpha-*.ovpn"
          sudo podman exec ${{ matrix.version }} find /etc/openvpn/ -maxdepth 3 -name "alpha-*.ovpn" -type f -exec cat {} \;
          echo cat /var/log/openvpn.log
          sudo podman exec ${{ matrix.version }} cat /var/log/openvpn.log
          echo journalctl -u openvpn-client@alpha-localhost.service
          sudo podman exec ${{ matrix.version }} journalctl -u openvpn-client@alpha-localhost.service
