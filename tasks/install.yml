---
# Install the EPEL repo RPM on RedHat-like machines
# https://docs.fedoraproject.org/en-US/epel/getting-started/
- name: install | Install EPEL for CentOS-like distros
  ansible.builtin.package:
    name: "{{ epel_package_name }}"
    state: present
  when:
    - ansible_facts['os_family'] == "RedHat"
    - ansible_facts['distribution'] != "Fedora"
    - ansible_facts['distribution'] != "RedHat"

# EPEL install is different for RHEL specifically: https://www.redhat.com/en/blog/install-epel-linux
- name: install | Install EPEL for RHEL
  ansible.builtin.dnf:
    name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm
    state: present
    disable_gpg_check: true
  when: ansible_facts['distribution'] == "RedHat"

- name: install | Gather the installed packages
  ansible.builtin.package_facts:
    manager: auto
  ignore_errors: true
  register: __package_gathering_result

# Handle any package gathering failure by setting an empty packages fact
# Safe as long as we're making decisions based on package not in facts
- name: install | Ensure packages fact exists
  ansible.builtin.set_fact:
    ansible_facts: "{{ ansible_facts | default({}) | combine({'packages': {}}) }}"
  when: __package_gathering_result.failed | default(false)

# We must refresh apt cache because attempting to install packages with an empty cache fails
# If openvpn isn't installed then assume we need to refresh the cache
- name: install | Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
  when:
    - ansible_facts["pkg_mgr"] == "apt"
    - openvpn_package_name not in ansible_facts['packages']

- name: install | Install openvpn
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  with_items:
    - "{{ openvpn_package_name }}"
    - "{{ openssl_package_name }}"

# Use the built version:
# Fedora/EPEL: https://packages.fedoraproject.org/pkgs/openvpn-auth-ldap/openvpn-auth-ldap/index.html
# Debian: https://packages.debian.org/search?keywords=openvpn-auth-ldap
# Ubuntu: https://launchpad.net/ubuntu/+source/openvpn-auth-ldap
- name: install | Install LDAP plugin
  ansible.builtin.package:
    name: "{{ openvpn_ldap_plugin_package_name }}"
    state: present
  when:
    - openvpn_use_ldap is truthy
    - openvpn_use_prebuilt_ldap_plugin is truthy

- name: install | Install selinux dependencies (RedHat)
  ansible.builtin.package:
    name: policycoreutils-python-utils
    state: present
  when:
    - ansible_facts['os_family'] == "RedHat"
    - ansible_facts['selinux']['status'] == 'enabled'
    - openvpn_selinux_use_semanage | bool

- name: install | Install selinux dependencies (Debian/Ubuntu)
  ansible.builtin.package:
    name: policycoreutils
    state: present
  when:
    - ansible_facts['os_family'] == "Debian"
    - ansible_facts['selinux']['status'] == 'enabled'
    - openvpn_selinux_use_semanage | bool

# We need to enable the CRB repo for CentOS 10-based distros
# There's a new selinux-policy-extra package in CRB
# https://wiki.almalinux.org/repos/AlmaLinux.html#almalinux-repositories
# https://wiki.rockylinux.org/rocky/repo/#base-repositories
# AlmaLinux has the repository enabled by default from 10.1
# https://almalinux.org/blog/2025-09-08-enabling-crb-by-default-for-almalinux10/
- name: install | Manage CRB repository for SELinux enabled CentOS 10-like distros
  when:
    - ansible_facts['os_family'] == "RedHat"
    - ansible_facts['distribution_major_version']|int >= 10
    - ansible_facts['distribution'] != "Fedora"
    - ansible_facts['distribution'] != "RedHat"
    - ansible_facts['selinux']['status'] == 'enabled'
    - not openvpn_selinux_use_semanage | bool
  block:
    - name: install | Check if CRB repository is enabled
      ansible.builtin.command: dnf repolist --enabled crb
      register: __crb_repolist
      changed_when: false
    - name: install | Enable CRB repository for CentOS 10-like distros
      ansible.builtin.command: dnf config-manager --set-enabled crb
      when: (__crb_repolist.stdout is not search('crb'))
      register: __crb_enabled
      changed_when: __crb_enabled.rc == 0

# RHEL has the group 'nobody', 'Debian/Ubuntu' have 'nogroup'
# standardize on 'nogroup'
- name: install | Ensure group 'nogroup' is present
  ansible.builtin.group:
    name: nogroup
    state: present
    system: true
